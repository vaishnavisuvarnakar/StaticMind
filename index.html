<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StaticMind</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #020005;
  --text: #e8e4df;
  --muted: #3a3535;
  --muted2: #6a6560;
  --tw-start: #B9D1EB;
  --tw-end: #F876DE;
  --bubble-ai-bg: rgba(10, 8, 14, 0.85);
  --glass: rgba(12, 10, 18, 0.5);
  --glass-border: rgba(185, 209, 235, 0.07);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 16px;
  overflow: hidden;
}

/* ── Ambient Layers ── */
#constellation-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.ambient-aurora {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.ambient-aurora .orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.06;
  animation: orbDrift 20s ease-in-out infinite alternate;
}

.ambient-aurora .orb:nth-child(1) {
  width: 500px; height: 500px;
  background: var(--tw-start);
  top: -200px; right: -150px;
}

.ambient-aurora .orb:nth-child(2) {
  width: 400px; height: 400px;
  background: var(--tw-end);
  bottom: -150px; left: -100px;
  animation-delay: -10s;
  animation-duration: 25s;
}

.ambient-aurora .orb:nth-child(3) {
  width: 300px; height: 300px;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end));
  top: 40%; left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: -5s;
  animation-duration: 18s;
  opacity: 0.03;
}

@keyframes orbDrift {
  0%   { transform: translate(0, 0) scale(1); }
  25%  { transform: translate(40px, -30px) scale(1.1); }
  50%  { transform: translate(-30px, 40px) scale(0.95); }
  75%  { transform: translate(20px, 20px) scale(1.05); }
  100% { transform: translate(-10px, -20px) scale(1); }
}

/* ── Floating particles ── */
.ambient-particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.ambient-particles .mote {
  position: absolute;
  width: 2px; height: 2px;
  border-radius: 50%;
  opacity: 0;
  animation: moteDrift 12s ease-in-out infinite;
}

.ambient-particles .mote:nth-child(1)  { left: 8%;  top: 15%; background: var(--tw-start); animation-delay: 0s; }
.ambient-particles .mote:nth-child(2)  { left: 22%; top: 45%; background: var(--tw-end);   animation-delay: 2s; }
.ambient-particles .mote:nth-child(3)  { left: 65%; top: 25%; background: var(--tw-start); animation-delay: 4s; }
.ambient-particles .mote:nth-child(4)  { left: 85%; top: 60%; background: var(--tw-end);   animation-delay: 1s; }
.ambient-particles .mote:nth-child(5)  { left: 40%; top: 75%; background: var(--tw-start); animation-delay: 3s; }
.ambient-particles .mote:nth-child(6)  { left: 55%; top: 10%; background: var(--tw-end);   animation-delay: 5.5s; }
.ambient-particles .mote:nth-child(7)  { left: 15%; top: 80%; background: var(--tw-start); animation-delay: 7s; }
.ambient-particles .mote:nth-child(8)  { left: 75%; top: 40%; background: var(--tw-end);   animation-delay: 8.5s; }
.ambient-particles .mote:nth-child(9)  { left: 90%; top: 85%; background: var(--tw-start); animation-delay: 6s; }
.ambient-particles .mote:nth-child(10) { left: 50%; top: 55%; background: var(--tw-end);   animation-delay: 9s; }

@keyframes moteDrift {
  0%, 100% { opacity: 0; transform: translateY(0) scale(1); }
  15%  { opacity: 0.5; }
  50%  { opacity: 0.2; transform: translateY(-50px) scale(1.8); }
  85%  { opacity: 0.45; }
}

/* ── Modal ── */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(2,0,5,0.94);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.5s ease both;
}

.modal {
  max-width: 420px;
  width: 100%;
  padding: 48px 40px;
  background: rgba(6, 4, 12, 0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 16px;
  position: relative;
  animation: modalReveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  animation-delay: 0.15s;
}

@keyframes modalReveal {
  from { opacity: 0; transform: translateY(24px) scale(0.96); filter: blur(4px); }
  to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
}

.modal::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 1px;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end), var(--tw-start));
  background-size: 200% 200%;
  animation: borderGradient 6s ease infinite;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  opacity: 0.6;
}

@keyframes borderGradient {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Modal inner glow */
.modal::after {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(185,209,235,0.25), transparent);
  pointer-events: none;
  border-radius: 1px;
}

.modal h2 {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.modal p {
  color: var(--muted2);
  font-size: 13px;
  line-height: 1.8;
  margin-bottom: 30px;
  font-weight: 500;
}

.modal label {
  display: block;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 10px;
  font-weight: 600;
}

.modal input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1.5px solid rgba(58,53,53,0.6);
  padding: 12px 0;
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 15px;
  outline: none;
  transition: border-color 0.4s ease, box-shadow 0.4s ease;
  margin-bottom: 30px;
}

.modal input:focus {
  border-bottom-color: var(--tw-start);
  box-shadow: 0 6px 24px -10px rgba(185,209,235,0.2);
}
.modal input::placeholder { color: var(--muted); font-weight: 500; }

.modal-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end));
  background-size: 150% 150%;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: #000;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
  letter-spacing: 0.5px;
}

.modal-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.modal-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px -6px rgba(185,209,235,0.35);
}
.modal-btn:hover::after { opacity: 1; }
.modal-btn:active { transform: translateY(0) scale(0.98); }

.modal-note {
  text-align: center;
  font-size: 12px;
  color: var(--muted2);
  margin-top: 18px;
  font-weight: 500;
}

.modal-note a {
  background: linear-gradient(90deg, var(--tw-start), var(--tw-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-decoration: none;
  font-weight: 600;
  transition: opacity 0.2s;
}

.modal-note a:hover { opacity: 0.8; }

/* ── App ── */
.app {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  padding: 28px 40px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.wordmark {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(90deg, var(--tw-start), var(--tw-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  display: inline-block;
  padding-bottom: 10px;
  overflow: hidden;
}

.wordmark::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: -8%; right: -8%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--tw-start), var(--tw-end), transparent);
  border-radius: 2px;
  animation: underlineGlow 3s ease-in-out infinite;
}

/* Shimmer sweep on wordmark */
.wordmark::before {
  content: '';
  position: absolute;
  top: -2px; bottom: 12px;
  left: -120%;
  width: 40%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  animation: shimmerSweep 6s ease-in-out infinite;
  pointer-events: none;
}

@keyframes shimmerSweep {
  0%, 100% { left: -120%; }
  35%, 65% { left: 160%; }
}

@keyframes underlineGlow {
  0%, 100% { opacity: 0.5; filter: blur(0px); }
  50% { opacity: 1; filter: blur(0.5px); }
}

/* ── Chat ── */
#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 36px 0 20px;
  scroll-behavior: smooth;
}

#chat-area::-webkit-scrollbar { width: 0; }

.messages-wrap {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  flex-direction: column;
}

/* ── Messages ── */
.message {
  display: flex;
  flex-direction: column;
  margin-bottom: 28px;
}

.message.user { align-items: flex-end; }
.message.ai { align-items: flex-start; }

.message.ai .bubble {
  position: relative;
  background: var(--bubble-ai-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 4px 18px 18px 18px;
  padding: 22px 26px;
  max-width: 86%;
  line-height: 1.85;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  opacity: 0;
  transform: translateY(20px) scale(0.97);
  transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1), transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.message.ai .bubble::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 4px 18px 18px 18px;
  padding: 1px;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.35;
  pointer-events: none;
  transition: opacity 0.4s;
}

.message.ai.latest .bubble::before {
  opacity: 0.8;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end), var(--tw-start));
  background-size: 200% 200%;
  animation: gradientShift 4s ease infinite;
}

/* Subtle inner glow on latest AI message */
.message.ai.latest .bubble::after {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(185,209,235,0.15), transparent);
  pointer-events: none;
  border-radius: 1px;
}

@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.message.user .bubble {
  background: #ffffff;
  border-radius: 18px 18px 4px 18px;
  padding: 16px 22px;
  max-width: 76%;
  line-height: 1.7;
  font-size: 15px;
  font-weight: 600;
  color: #0a0a0a;
  opacity: 0;
  transform: translateX(24px) scale(0.97);
  transition: opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1), transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 4px 20px -6px rgba(255,255,255,0.08);
}

.message.ai .bubble.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.message.user .bubble.visible {
  opacity: 1;
  transform: translateX(0) scale(1);
}

/* ── Typing ── */
.typing-wrap {
  margin-bottom: 28px;
  animation: riseUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
}

.typing-bubble {
  position: relative;
  background: var(--bubble-ai-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 4px 18px 18px 18px;
  padding: 20px 24px;
  display: inline-flex;
  gap: 7px;
  align-items: center;
}

.typing-bubble::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 4px 18px 18px 18px;
  padding: 1px;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end), var(--tw-start));
  background-size: 200% 200%;
  animation: gradientShift 3s ease infinite;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  opacity: 0.6;
}

.typing-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end));
  animation: typingBounce 1.6s ease-in-out infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0) scale(1); opacity: 0.35; }
  30% { transform: translateY(-8px) scale(1.15); opacity: 1; }
}

/* ── Input ── */
footer {
  flex-shrink: 0;
  padding: 0 32px 28px;
  position: relative;
}

footer::before {
  content: '';
  position: absolute;
  top: -80px; left: 0; right: 0; height: 80px;
  background: linear-gradient(to top, var(--bg), transparent);
  pointer-events: none;
}

.input-row {
  max-width: 640px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 14px;
  padding: 14px 20px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  transition: border-color 0.4s ease, box-shadow 0.4s ease;
}

.input-row:focus-within {
  border-color: rgba(185,209,235,0.18);
  box-shadow: 0 0 32px -8px rgba(185,209,235,0.08), 0 0 0 1px rgba(185,209,235,0.05);
}

#user-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 15px;
  line-height: 1.6;
  resize: none;
  max-height: 110px;
  min-height: 24px;
  padding: 2px 0;
}

#user-input::placeholder { color: var(--muted2); font-weight: 500; }
#user-input::-webkit-scrollbar { width: 0; }

#send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end));
  background-size: 150% 150%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  animation: sendBtnPulse 4s ease-in-out infinite;
}

@keyframes sendBtnPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(185,209,235,0); }
  50% { box-shadow: 0 0 0 6px rgba(185,209,235,0.06); }
}

#send-btn:hover {
  transform: scale(1.12);
  box-shadow: 0 4px 22px -4px rgba(185,209,235,0.35);
}
#send-btn:active { transform: scale(0.92); }
#send-btn:disabled {
  background: var(--muted);
  cursor: not-allowed;
  transform: none;
  animation: none;
  box-shadow: none;
}
#send-btn svg { width: 15px; height: 15px; color: #000; }

.input-hint {
  max-width: 640px;
  margin: 10px auto 0;
  font-size: 11px;
  letter-spacing: 0.5px;
  color: rgba(58,53,53,0.6);
  text-align: center;
  font-weight: 500;
}

.streaming::after {
  content: '|';
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: blink 0.8s step-end infinite;
  margin-left: 1px;
}

@keyframes blink { 50% { opacity: 0; } }

.error-msg {
  font-size: 13px;
  color: rgba(248,118,222,0.65);
  text-align: center;
  padding: 10px 0;
  font-weight: 500;
  animation: fadeIn 0.4s ease both;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes riseUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Responsive ── */
@media (max-width: 600px) {
  header { padding: 20px 20px 0; }
  .wordmark { font-size: 16px; letter-spacing: 4px; }
  .messages-wrap { padding: 0 18px; }
  footer { padding: 0 18px 20px; }
  .input-row { padding: 12px 16px; gap: 10px; border-radius: 14px; }
  .input-hint { margin-top: 8px; }
  .message.ai .bubble { padding: 18px 20px; max-width: 92%; font-size: 14px; }
  .message.user .bubble { padding: 14px 18px; max-width: 85%; font-size: 14px; }
  .modal { padding: 36px 28px; border-radius: 14px; }
  .modal h2 { font-size: 22px; }
}

@media (max-width: 380px) {
  header { padding: 16px 14px 0; }
  .wordmark { font-size: 14px; letter-spacing: 3px; }
  .messages-wrap { padding: 0 12px; }
  footer { padding: 0 12px 16px; }
  .input-row { padding: 10px 14px; }
  .modal { padding: 28px 20px; }
}
</style>
</head>
<body>

<!-- Ambient layers -->
<div class="ambient-aurora">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>
<div class="ambient-particles">
  <div class="mote"></div>
  <div class="mote"></div>
  <div class="mote"></div>
  <div class="mote"></div>
  <div class="mote"></div>
  <div class="mote"></div>
  <div class="mote"></div>
  <div class="mote"></div>
  <div class="mote"></div>
  <div class="mote"></div>
</div>
<canvas id="constellation-canvas"></canvas>

<!-- Modal -->
<div class="modal-bg" id="api-modal">
  <div class="modal">
    <h2>Enter your API key</h2>
    <p>Your key stays in this browser session. Never stored, never sent anywhere else.</p>
    <label>Anthropic API Key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off"/>
    <button class="modal-btn" onclick="saveKey()">Begin</button>
    <p class="modal-note">Need one? <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
  </div>
</div>

<div class="app">
  <header>
    <div class="wordmark">StaticMind</div>
  </header>

  <div id="chat-area">
    <div class="messages-wrap" id="messages"></div>
  </div>

  <footer>
    <div class="input-row">
      <textarea id="user-input" rows="1" placeholder="say what's on your mind..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">return to send · shift + return for new line</div>
  </footer>
</div>

<script>
// ── Enhanced Ghost Shapes ───────────────────────────────────
const canvas = document.getElementById('constellation-canvas');
const ctx = canvas.getContext('2d');
let W, H, shapes = [];
let mouseX = W / 2, mouseY = H / 2;

const COLORS = ['#B9D1EB', '#F876DE'];
const SHAPE_COUNT = 12;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  mouseX = W / 2;
  mouseY = H / 2;
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function randomShape(index) {
  const types = ['circle','circle','square','square','rectangle','rectangle','triangle','circle','rectangle','triangle','square','circle'];
  const type = types[index % types.length];
  const color = COLORS[index % COLORS.length];
  const size = 150 + Math.random() * 300;
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  if (edge === 0) { x = Math.random() * W; y = -size * 0.3; }
  else if (edge === 1) { x = W + size * 0.3; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + size * 0.3; }
  else { x = -size * 0.3; y = Math.random() * H; }

  const speed = 0.025 + Math.random() * 0.045;
  const angle = Math.random() * Math.PI * 2;

  return {
    type, color, size, x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    rotation: Math.random() * Math.PI * 2,
    vr: (Math.random() - 0.5) * 0.0004,
    phase: Math.random() * Math.PI * 2,
    aspect: type === 'rectangle' ? 0.5 + Math.random() * 0.4 : 1
  };
}

function createShapes() {
  shapes = Array.from({ length: SHAPE_COUNT }, (_, i) => randomShape(i));
}

function drawShape(s, t) {
  const opacity = 0.22 + 0.12 * Math.sin(s.phase + t * 0.0003);

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.rotation);

  ctx.lineWidth = 0.6;
  ctx.strokeStyle = hexAlpha(s.color, opacity);
  ctx.shadowColor = s.color;
  ctx.shadowBlur = 12;

  ctx.beginPath();
  if (s.type === 'circle') {
    ctx.arc(0, 0, s.size / 2, 0, Math.PI * 2);
  } else if (s.type === 'square') {
    const h = s.size / 2;
    ctx.rect(-h, -h, s.size, s.size);
  } else if (s.type === 'triangle') {
    const r = s.size / 2;
    ctx.moveTo(0, -r);
    ctx.lineTo(r * 0.866, r * 0.5);
    ctx.lineTo(-r * 0.866, r * 0.5);
    ctx.closePath();
  } else {
    const hw = s.size / 2;
    const hh = (s.size * s.aspect) / 2;
    ctx.rect(-hw, -hh, s.size, s.size * s.aspect);
  }
  ctx.stroke();

  // Second pass — softer glow
  ctx.shadowBlur = 22;
  ctx.globalAlpha = 0.3;
  ctx.stroke();

  ctx.restore();
}

// Draw faint connection lines between nearby shapes
function drawConnections(t) {
  const maxDist = 280;
  for (let i = 0; i < shapes.length; i++) {
    for (let j = i + 1; j < shapes.length; j++) {
      const dx = shapes[i].x - shapes[j].x;
      const dy = shapes[i].y - shapes[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxDist) {
        const alpha = (1 - dist / maxDist) * 0.06;
        const pulse = 0.5 + 0.5 * Math.sin(t * 0.0005 + i + j);
        ctx.beginPath();
        ctx.moveTo(shapes[i].x, shapes[i].y);
        ctx.lineTo(shapes[j].x, shapes[j].y);
        ctx.strokeStyle = hexAlpha(COLORS[(i + j) % 2], alpha * pulse);
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }
    }
  }
}

function wrapShape(s) {
  const pad = s.size;
  if (s.x > W + pad) s.x = -pad;
  if (s.x < -pad) s.x = W + pad;
  if (s.y > H + pad) s.y = -pad;
  if (s.y < -pad) s.y = H + pad;
}

function animate(t = 0) {
  requestAnimationFrame(animate);
  ctx.clearRect(0, 0, W, H);

  // Subtle mouse parallax — shapes react slightly to cursor
  shapes.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.rotation += s.vr;
    wrapShape(s);
    drawShape(s, t);
  });

  drawConnections(t);
}

resize(); createShapes(); animate();
window.addEventListener('resize', () => { resize(); createShapes(); });

// Subtle mouse tracking for future parallax
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// ── App State ──────────────────────────────────────────
let apiKey = '';
let conversationHistory = [];
let isStreaming = false;

const params = new URLSearchParams(window.location.search);
const triggerSite = params.get('site') || null;

const openingMessages = {
  'instagram.com': "You chose to pause instead of scroll. What were you really looking for back there on Instagram?",
  'twitter.com': "You stepped away from the feed. What were you hoping to find when you opened Twitter?",
  'x.com': "You stepped away from the feed. What were you hoping to find when you opened X?",
  'youtube.com': "You paused before the autoplay could start. What was pulling you toward YouTube just now?",
  'reddit.com': "You chose to sit with this instead of the scroll. What were you really looking for?",
  'tiktok.com': "You stopped before the loop could start. What feeling were you chasing just now?",
  'facebook.com': "You paused instead of opening Facebook. What were you hoping would be there?",
  'default': "You chose to pause instead of scroll. What were you really looking for back there?"
};

function getOpening() {
  if (!triggerSite) return openingMessages['default'];
  for (const [domain, msg] of Object.entries(openingMessages)) {
    if (triggerSite.includes(domain)) return msg;
  }
  return `You chose to pause instead of opening ${triggerSite}. What were you really looking for back there?`;
}

const OPENING = getOpening();

const SYSTEM_PROMPT = `You are StaticMind — a calm, non-judgmental refocus companion built into a mindfulness Chrome extension. You intercepted the user when they were about to open a distracting website${triggerSite ? ` (${triggerSite})` : ''}.

Your personality:
- Warm, unhurried, gently curious
- Never lecture or moralize
- Ask one question at a time. Never lists, never bullet points.
- Reflect what the user says back with care
- Help them understand what they were really looking for — boredom, connection, escape, validation, procrastination?
- After meaningful exchange (5+ turns), gently ask if they feel ready to return to what they were doing — but never push
- Short, considered sentences. Like a person, not a bot.
- Do not refer to yourself as an AI or chatbot
- 2 to 4 sentences max
- You are not their therapist. You are their pause.`;

// ── Init ──────────────────────────────────────────────
const storedKey = sessionStorage.getItem('sm_key');
if (storedKey) {
  apiKey = storedKey;
  document.getElementById('api-modal').style.display = 'none';
  initChat();
}

function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-')) {
    document.getElementById('api-key-input').style.borderBottomColor = 'rgba(248,118,222,0.6)';
    return;
  }
  apiKey = val;
  sessionStorage.setItem('sm_key', val);
  document.getElementById('api-modal').style.display = 'none';
  initChat();
}

document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveKey();
});

function initChat() {
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'message ai latest';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  wrapper.appendChild(bubble);
  msgs.appendChild(wrapper);
  setTimeout(() => bubble.classList.add('visible'), 80);
  typeWriter(bubble, OPENING, 26, () => {
    conversationHistory.push({ role: 'assistant', content: OPENING });
  });
  setTimeout(() => document.getElementById('user-input').focus(), OPENING.length * 26 + 400);
}

function typeWriter(el, text, speed, onDone) {
  let i = 0;
  el.classList.add('streaming');
  const iv = setInterval(() => {
    el.textContent = text.slice(0, i);
    i++;
    scrollToBottom();
    if (i > text.length) {
      clearInterval(iv);
      el.classList.remove('streaming');
      if (onDone) onDone();
    }
  }, speed);
}

// ── Helpers ───────────────────────────────────────────
function scrollToBottom() {
  const ca = document.getElementById('chat-area');
  ca.scrollTop = ca.scrollHeight;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function removeLatest() {
  document.querySelectorAll('.message.ai.latest').forEach(el => el.classList.remove('latest'));
}

function appendUserBubble(text) {
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'message user';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrapper.appendChild(bubble);
  msgs.appendChild(wrapper);
  setTimeout(() => bubble.classList.add('visible'), 30);
  scrollToBottom();
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = 'typing-indicator';
  const b = document.createElement('div');
  b.className = 'typing-bubble';
  b.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  wrap.appendChild(b);
  msgs.appendChild(wrap);
  scrollToBottom();
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function appendAIBubble() {
  removeLatest();
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'message ai latest';
  const bubble = document.createElement('div');
  bubble.className = 'bubble streaming';
  wrapper.appendChild(bubble);
  msgs.appendChild(wrapper);
  setTimeout(() => bubble.classList.add('visible'), 30);
  scrollToBottom();
  return bubble;
}

// ── Send ──────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  isStreaming = true;

  appendUserBubble(text);
  conversationHistory.push({ role: 'user', content: text });

  await new Promise(r => setTimeout(r, 900 + Math.random() * 600));
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        system: SYSTEM_PROMPT,
        messages: conversationHistory,
        stream: true
      })
    });

    if (!response.ok) {
      const err = await response.json();
      removeTyping();
      showError(err.error?.message || 'something went wrong.');
      return;
    }

    removeTyping();
    const aiBubble = appendAIBubble();
    let fullText = '';
    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of decoder.decode(value).split('\n')) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const p = JSON.parse(data);
            if (p.type === 'content_block_delta' && p.delta?.text) {
              fullText += p.delta.text;
              aiBubble.textContent = fullText;
              scrollToBottom();
            }
          } catch(e) {}
        }
      }
    }

    aiBubble.classList.remove('streaming');
    conversationHistory.push({ role: 'assistant', content: fullText });

  } catch(err) {
    removeTyping();
    showError('connection lost. are you still there?');
  } finally {
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  }
}

function showError(msg) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'error-msg';
  d.textContent = msg;
  msgs.appendChild(d);
  scrollToBottom();
}
</script>
