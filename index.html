<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StaticMind</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000000;
  --text: #e8e4df;
  --muted: #3a3535;
  --muted2: #6a6560;
  --tw-start: #B9D1EB;
  --tw-end: #F876DE;
  --bubble-ai-bg: rgba(10, 8, 12, 0.9);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 16px;
  overflow: hidden;
}

#constellation-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── Modal ── */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(10px);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.4s ease both;
}

.modal {
  max-width: 420px;
  width: 100%;
  padding: 44px 38px;
  background: #06040a;
  border-radius: 4px;
  position: relative;
  animation: riseUp 0.5s ease both;
}

.modal::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 4px;
  padding: 1.5px;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.modal h2 {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 10px;
}

.modal p {
  color: var(--muted2);
  font-size: 13px;
  line-height: 1.7;
  margin-bottom: 28px;
  font-weight: 700;
}

.modal label {
  display: block;
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 10px;
}

.modal input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--muted);
  padding: 10px 0;
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 15px;
  outline: none;
  transition: border-color 0.3s;
  margin-bottom: 28px;
}

.modal input:focus { border-bottom-color: var(--tw-start); }
.modal input::placeholder { color: var(--muted); }

.modal-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(90deg, var(--tw-start), var(--tw-end));
  border: none;
  border-radius: 2px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: #000;
  transition: opacity 0.2s;
}

.modal-btn:hover { opacity: 0.85; }

.modal-note {
  text-align: center;
  font-size: 12px;
  color: var(--muted2);
  margin-top: 16px;
}

.modal-note a {
  background: linear-gradient(90deg, var(--tw-start), var(--tw-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-decoration: none;
}

/* ── App ── */
.app {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  padding: 32px 40px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.wordmark {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 5px;
  text-transform: uppercase;
  background: linear-gradient(90deg, var(--tw-start), var(--tw-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  display: inline-block;
  padding-bottom: 8px;
}

.wordmark::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: -8%;
  right: -8%;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--tw-start), var(--tw-end), transparent);
  border-radius: 2px;
  animation: underlineGlow 3s ease-in-out infinite;
}

@keyframes underlineGlow {
  0%, 100% { opacity: 0.6; filter: blur(0px); }
  50% { opacity: 1; filter: blur(0.5px); }
}

/* ── Chat ── */
#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 36px 0 20px;
  scroll-behavior: smooth;
}

#chat-area::-webkit-scrollbar { width: 0; }

.messages-wrap {
  max-width: 620px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  flex-direction: column;
}

/* ── Messages ── */
.message {
  display: flex;
  flex-direction: column;
  margin-bottom: 28px;
}

.message.user { align-items: flex-end; }
.message.ai { align-items: flex-start; }

.message.ai .bubble {
  position: relative;
  background: var(--bubble-ai-bg);
  border-radius: 2px 16px 16px 16px;
  padding: 20px 24px;
  max-width: 86%;
  line-height: 1.8;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}

.message.ai .bubble::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 2px 16px 16px 16px;
  padding: 1px;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.45;
  pointer-events: none;
}

.message.ai.latest .bubble::before {
  opacity: 1;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end), var(--tw-start));
  background-size: 200% 200%;
  animation: gradientShift 4s ease infinite;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.message.user .bubble {
  background: #ffffff;
  border-radius: 16px 16px 2px 16px;
  padding: 14px 20px;
  max-width: 76%;
  line-height: 1.7;
  font-size: 15px;
  font-weight: 700;
  color: #0a0a0a;
  opacity: 0;
  transform: translateX(22px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}

.message.ai .bubble.visible {
  opacity: 1;
  transform: translateY(0);
}

.message.user .bubble.visible {
  opacity: 1;
  transform: translateX(0);
}

/* ── Typing ── */
.typing-wrap {
  margin-bottom: 28px;
  animation: riseUp 0.3s ease both;
}

.typing-bubble {
  position: relative;
  background: var(--bubble-ai-bg);
  border-radius: 2px 16px 16px 16px;
  padding: 18px 22px;
  display: inline-flex;
  gap: 6px;
  align-items: center;
}

.typing-bubble::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 2px 16px 16px 16px;
  padding: 1px;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  background-size: 200% 200%;
  animation: gradientShift 3s ease infinite;
}

.typing-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end));
  animation: typingFloat 1.4s ease-in-out infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingFloat {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ── Input ── */
footer {
  flex-shrink: 0;
  padding: 0 32px 32px;
  position: relative;
}

footer::before {
  content: '';
  position: absolute;
  top: -60px; left: 0; right: 0; height: 60px;
  background: linear-gradient(to top, var(--bg), transparent);
  pointer-events: none;
}

.input-row {
  max-width: 620px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 12px;
  border-bottom: 1px solid var(--muted);
  padding-bottom: 12px;
  transition: border-color 0.3s;
}

.input-row:focus-within {
  border-bottom-color: rgba(185,209,235,0.45);
}

#user-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 15px;
  line-height: 1.6;
  resize: none;
  max-height: 110px;
  min-height: 24px;
  padding: 2px 0;
}

#user-input::placeholder { color: var(--muted2); }
#user-input::-webkit-scrollbar { width: 0; }

#send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end));
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  position: relative;
  bottom: 3px;
}

#send-btn:hover { transform: scale(1.1); opacity: 0.88; }
#send-btn:active { transform: scale(0.95); }
#send-btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }
#send-btn svg { width: 14px; height: 14px; color: #000; }

.input-hint {
  max-width: 620px;
  margin: 10px auto 0;
  font-size: 11px;
  letter-spacing: 0.4px;
  color: var(--muted);
  text-align: center;
}

.streaming::after {
  content: '|';
  background: linear-gradient(135deg, var(--tw-start), var(--tw-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: blink 0.8s step-end infinite;
}

@keyframes blink { 50% { opacity: 0; } }

.error-msg {
  font-size: 13px;
  color: rgba(248,118,222,0.7);
  text-align: center;
  padding: 10px 0;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes riseUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<canvas id="constellation-canvas"></canvas>

<!-- Modal -->
<div class="modal-bg" id="api-modal">
  <div class="modal">
    <h2>Enter your API key</h2>
    <p>Your key stays in this browser session. Never stored, never sent anywhere else.</p>
    <label>Anthropic API Key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off"/>
    <button class="modal-btn" onclick="saveKey()">Begin</button>
    <p class="modal-note">Need one? <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
  </div>
</div>

<div class="app">
  <header>
    <div class="wordmark">StaticMind</div>
  </header>

  <div id="chat-area">
    <div class="messages-wrap" id="messages"></div>
  </div>

  <footer>
    <div class="input-row">
      <textarea id="user-input" rows="1" placeholder="say what's on your mind..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">return to send · shift + return for new line</div>
  </footer>
</div>

<script>
// ── Ghost Shapes ───────────────────────────────────────
const canvas = document.getElementById('constellation-canvas');
const ctx = canvas.getContext('2d');
let W, H, shapes = [];

const COLORS = ['#B9D1EB', '#F876DE'];
const SHAPE_COUNT = 9;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Shape types: circle, square, rectangle
function randomShape(index) {
  const type = ['circle','circle','square','square','rectangle','rectangle','square','circle','rectangle'][index % 9];
  const color = COLORS[index % COLORS.length];
  // Size: big enough that only a fragment shows
  const size = 180 + Math.random() * 260;
  // Start position: place center partially off-screen so only edges visible
  const edge = Math.floor(Math.random() * 4); // 0=top,1=right,2=bottom,3=left
  let x, y;
  if (edge === 0) { x = Math.random() * W; y = -size * 0.3; }
  else if (edge === 1) { x = W + size * 0.3; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + size * 0.3; }
  else { x = -size * 0.3; y = Math.random() * H; }

  // Very slow drift — max 0.08px per frame
  const speed = 0.03 + Math.random() * 0.05;
  const angle = Math.random() * Math.PI * 2;

  return {
    type, color, size, x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    rotation: Math.random() * Math.PI * 2,
    vr: (Math.random() - 0.5) * 0.0003, // almost no rotation
    phase: Math.random() * Math.PI * 2,
    aspect: type === 'rectangle' ? 0.5 + Math.random() * 0.4 : 1
  };
}

function createShapes() {
  shapes = Array.from({ length: SHAPE_COUNT }, (_, i) => randomShape(i));
}

function drawShape(s, t) {
  // Soft pulse on opacity
  const opacity = 0.28 + 0.1 * Math.sin(s.phase + t * 0.0004);

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.rotation);

  // Clip to canvas so shapes outside bounds don't render wastefully
  ctx.lineWidth = 0.8;
  ctx.strokeStyle = hexAlpha(s.color, opacity);

  // Soft glow — draw same shape twice, blurred wider
  ctx.shadowColor = s.color;
  ctx.shadowBlur = 10;

  ctx.beginPath();
  if (s.type === 'circle') {
    ctx.arc(0, 0, s.size / 2, 0, Math.PI * 2);
  } else if (s.type === 'square') {
    const h = s.size / 2;
    ctx.rect(-h, -h, s.size, s.size);
  } else {
    // rectangle
    const hw = s.size / 2;
    const hh = (s.size * s.aspect) / 2;
    ctx.rect(-hw, -hh, s.size, s.size * s.aspect);
  }
  ctx.stroke();

  // Second pass, even softer
  ctx.shadowBlur = 18;
  ctx.globalAlpha = 0.4;
  ctx.stroke();

  ctx.restore();
}

function wrapShape(s) {
  const pad = s.size;
  if (s.x > W + pad) s.x = -pad;
  if (s.x < -pad) s.x = W + pad;
  if (s.y > H + pad) s.y = -pad;
  if (s.y < -pad) s.y = H + pad;
}

function animate(t = 0) {
  requestAnimationFrame(animate);
  ctx.clearRect(0, 0, W, H);
  shapes.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.rotation += s.vr;
    wrapShape(s);
    drawShape(s, t);
  });
}

resize(); createShapes(); animate();
window.addEventListener('resize', () => { resize(); createShapes(); });

// ── App State ──────────────────────────────────────────
let apiKey = '';
let conversationHistory = [];
let isStreaming = false;

const params = new URLSearchParams(window.location.search);
const triggerSite = params.get('site') || null;

const openingMessages = {
  'instagram.com': "You chose to pause instead of scroll. What were you really looking for back there on Instagram?",
  'twitter.com': "You stepped away from the feed. What were you hoping to find when you opened Twitter?",
  'x.com': "You stepped away from the feed. What were you hoping to find when you opened X?",
  'youtube.com': "You paused before the autoplay could start. What was pulling you toward YouTube just now?",
  'reddit.com': "You chose to sit with this instead of the scroll. What were you really looking for?",
  'tiktok.com': "You stopped before the loop could start. What feeling were you chasing just now?",
  'facebook.com': "You paused instead of opening Facebook. What were you hoping would be there?",
  'default': "You chose to pause instead of scroll. What were you really looking for back there?"
};

function getOpening() {
  if (!triggerSite) return openingMessages['default'];
  for (const [domain, msg] of Object.entries(openingMessages)) {
    if (triggerSite.includes(domain)) return msg;
  }
  return `You chose to pause instead of opening ${triggerSite}. What were you really looking for back there?`;
}

const OPENING = getOpening();

const SYSTEM_PROMPT = `You are StaticMind — a calm, non-judgmental refocus companion built into a mindfulness Chrome extension. You intercepted the user when they were about to open a distracting website${triggerSite ? ` (${triggerSite})` : ''}.

Your personality:
- Warm, unhurried, gently curious
- Never lecture or moralize
- Ask one question at a time. Never lists, never bullet points.
- Reflect what the user says back with care
- Help them understand what they were really looking for — boredom, connection, escape, validation, procrastination?
- After meaningful exchange (5+ turns), gently ask if they feel ready to return to what they were doing — but never push
- Short, considered sentences. Like a person, not a bot.
- Do not refer to yourself as an AI or chatbot
- 2 to 4 sentences max
- You are not their therapist. You are their pause.`;

// ── Init ──────────────────────────────────────────────
const storedKey = sessionStorage.getItem('sm_key');
if (storedKey) {
  apiKey = storedKey;
  document.getElementById('api-modal').style.display = 'none';
  initChat();
}

function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-')) {
    document.getElementById('api-key-input').style.borderBottomColor = 'rgba(248,118,222,0.6)';
    return;
  }
  apiKey = val;
  sessionStorage.setItem('sm_key', val);
  document.getElementById('api-modal').style.display = 'none';
  initChat();
}

document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveKey();
});

function initChat() {
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'message ai latest';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  wrapper.appendChild(bubble);
  msgs.appendChild(wrapper);
  setTimeout(() => bubble.classList.add('visible'), 80);
  typeWriter(bubble, OPENING, 26, () => {
    conversationHistory.push({ role: 'assistant', content: OPENING });
  });
  setTimeout(() => document.getElementById('user-input').focus(), OPENING.length * 26 + 400);
}

function typeWriter(el, text, speed, onDone) {
  let i = 0;
  el.classList.add('streaming');
  const iv = setInterval(() => {
    el.textContent = text.slice(0, i);
    i++;
    scrollToBottom();
    if (i > text.length) {
      clearInterval(iv);
      el.classList.remove('streaming');
      if (onDone) onDone();
    }
  }, speed);
}

// ── Helpers ───────────────────────────────────────────
function scrollToBottom() {
  const ca = document.getElementById('chat-area');
  ca.scrollTop = ca.scrollHeight;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function removeLatest() {
  document.querySelectorAll('.message.ai.latest').forEach(el => el.classList.remove('latest'));
}

function appendUserBubble(text) {
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'message user';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrapper.appendChild(bubble);
  msgs.appendChild(wrapper);
  setTimeout(() => bubble.classList.add('visible'), 30);
  scrollToBottom();
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = 'typing-indicator';
  const b = document.createElement('div');
  b.className = 'typing-bubble';
  b.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  wrap.appendChild(b);
  msgs.appendChild(wrap);
  scrollToBottom();
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function appendAIBubble() {
  removeLatest();
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'message ai latest';
  const bubble = document.createElement('div');
  bubble.className = 'bubble streaming';
  wrapper.appendChild(bubble);
  msgs.appendChild(wrapper);
  setTimeout(() => bubble.classList.add('visible'), 30);
  scrollToBottom();
  return bubble;
}

// ── Send ──────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  isStreaming = true;

  appendUserBubble(text);
  conversationHistory.push({ role: 'user', content: text });

  await new Promise(r => setTimeout(r, 900 + Math.random() * 600));
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        system: SYSTEM_PROMPT,
        messages: conversationHistory,
        stream: true
      })
    });

    if (!response.ok) {
      const err = await response.json();
      removeTyping();
      showError(err.error?.message || 'something went wrong.');
      return;
    }

    removeTyping();
    const aiBubble = appendAIBubble();
    let fullText = '';
    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of decoder.decode(value).split('\n')) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const p = JSON.parse(data);
            if (p.type === 'content_block_delta' && p.delta?.text) {
              fullText += p.delta.text;
              aiBubble.textContent = fullText;
              scrollToBottom();
            }
          } catch(e) {}
        }
      }
    }

    aiBubble.classList.remove('streaming');
    conversationHistory.push({ role: 'assistant', content: fullText });

  } catch(err) {
    removeTyping();
    showError('connection lost. are you still there?');
  } finally {
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  }
}

function showError(msg) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'error-msg';
  d.textContent = msg;
  msgs.appendChild(d);
  scrollToBottom();
}
</script>
</body>
</html>
